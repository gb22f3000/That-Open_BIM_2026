<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GB Creation - Digital Twin BIM Viewer by Gautam Bhardwaj</title>
    <meta name="description" content="GB Creation - Digital Twin BIM Viewer - A comprehensive 3D BIM model visualizer and optimization tool by Gautam Bhardwaj">
    <meta name="author" content="Gautam Bhardwaj">
    <meta name="keywords" content="BIM, 3D visualization, model optimizer, IFC viewer, fragments, GB Creation, Gautam Bhardwaj">
    <link rel="stylesheet" href="style.css">
    <style>
      #panic-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.8);
        color: #ff4444;
        z-index: 99999;
        display: none;
        padding: 20px;
        font-family: monospace;
        overflow: auto;
        pointer-events: auto;
      }
      #boot-log {
        position: fixed;
        bottom: 0;
        right: 0;
        width: 400px;
        height: 300px;
        background: rgba(0,0,0,0.85);
        color: #0f0;
        z-index: 99998;
        padding: 10px;
        font-family: monospace;
        font-size: 11px;
        overflow: auto;
        border-top-left-radius: 10px;
        border: 1px solid #333;
      }
      .log-entry { margin-bottom: 2px; border-bottom: 1px solid #222; }
      .log-error { color: #ff4444; background: rgba(50,0,0,0.5); }
      .log-warn { color: #ffaa00; }
      .log-info { color: #88ccff; }
    </style>
</head>
<body>
    <script>
      // 🛡️ EMERGENCY LOGGER - DISABLED
      (function() {
        // Simple error capturing without visual logs
        const originalConsoleError = console.error;
        console.error = function(...args) {
          originalConsoleError.apply(console, args);
        };
      })();
    </script>

    <div id="root"></div>
  <!-- Legacy 3D viewer container for main.js integration (kept visible transiently; JS may reparent) -->
    <script type="module" src="/src/main.jsx"></script>
</body>
</html>
